# ===================================================================
# TEMPLATES HSM
# ===================================================================

templates:
  schema:
    id: "string — {categoria}-{numero}"
    name: "string — nome interno"
    category: "string — utility | marketing | authentication"
    language: "string — pt_BR"
    header:
      type: "string — text | image | video | document"
      content: "string — texto ou URL do media"
    body: "string — texto com variaveis {{1}}, {{2}}, etc. (max 1024 chars)"
    footer: "string — texto fixo (max 60 chars)"
    buttons:
      - type: "string — quick_reply | url | phone"
        text: "string — texto do botao"
        url: "string — URL (se type=url)"
        phone: "string — numero (se type=phone)"
    status: "string — draft | submitted | approved | rejected"
    meta_template_id: "string — ID retornado pela Meta apos aprovacao"
    version: "int — versao do template (imutavel apos aprovacao)"
    submitted_at: "datetime"
    approved_at: "datetime"
    rejected_reason: "string — motivo da rejeicao (se rejected)"

  examples:
    - id: "UTL-001"
      name: "confirmacao_demo"
      category: "utility"
      language: "pt_BR"
      header:
        type: "text"
        content: "Demonstracao Confirmada"
      body: "Ola {{1}}, sua demonstracao do {{2}} esta confirmada para {{3}} as {{4}}. Nosso consultor {{5}} estara presente. Precisa reagendar? Responda esta mensagem."
      footer: "Salk Medical"
      buttons:
        - type: "quick_reply"
          text: "Confirmar presenca"
        - type: "quick_reply"
          text: "Reagendar"
      status: "draft"
      version: 1

    - id: "UTL-002"
      name: "envio_ficha_tecnica"
      category: "utility"
      language: "pt_BR"
      header:
        type: "document"
        content: "{{media_url}}"
      body: "{{1}}, aqui esta a ficha tecnica do {{2}} conforme solicitado. O documento inclui especificacoes completas, certificacoes e dimensoes. Qualquer duvida, estamos a disposicao."
      footer: "Salk Medical — Equipamento Medico Nacional"
      buttons:
        - type: "quick_reply"
          text: "Solicitar proposta"
        - type: "quick_reply"
          text: "Falar com consultor"
      status: "draft"
      version: 1

    - id: "MKT-001"
      name: "nurturing_specs_lev"
      category: "marketing"
      language: "pt_BR"
      header:
        type: "document"
        content: "ficha-tecnica-lev.pdf"
      body: |
        Ola {{1}}, tudo bem?

        Preparamos a ficha tecnica completa do foco cirurgico LEV com todas as especificacoes:
        - Ra = 99 (fidelidade de cor maxima)
        - Profundidade de 1.930mm
        - 5 articulacoes independentes
        - Recarga em 2-4,5h

        {{2}}
      footer: "Salk Medical — Equipamento Medico Nacional"
      buttons:
        - type: "quick_reply"
          text: "Quero agendar demo"
        - type: "quick_reply"
          text: "Enviar para colega"
        - type: "url"
          text: "Ver no site"
          url: "https://salkmedical.com.br/lev?utm_source=whatsapp&utm_medium=social&utm_campaign={{3}}"
      status: "draft"
      version: 1

    - id: "MKT-002"
      name: "nurturing_tco_kratus"
      category: "marketing"
      language: "pt_BR"
      header:
        type: "document"
        content: "tco-kratus-analise.pdf"
      body: |
        {{1}}, sua equipe cirurgica trabalha com a mesa certa para cada procedimento?

        O KRATUS oferece:
        - Posicionamento multiarticulado para todas especialidades
        - TCO 40% menor que solucoes importadas
        - Margem de preferencia 20% em licitacoes

        Calculamos o ROI especifico para o perfil do {{2}}.

        {{3}}
      footer: "Salk Medical — Equipamento Medico Nacional"
      buttons:
        - type: "quick_reply"
          text: "Ver proposta completa"
        - type: "quick_reply"
          text: "Agendar visita tecnica"
      status: "draft"
      version: 1

    - id: "MKT-007"
      name: "nurturing_seguranca_ostus"
      category: "marketing"
      language: "pt_BR"
      header:
        type: "image"
        content: "ostus-seguranca-paciente.jpg"
      body: |
        {{1}}, quedas de leito representam um dos eventos adversos mais frequentes.

        O OSTUS foi projetado para prevencao ativa:
        - Grades laterais com trava de seguranca
        - Freio centralizado em todas as rodas
        - Posicao Trendelenburg para emergencias

        Veja como a UTI do Hospital {{2}} otimizou o workflow de enfermagem.
      footer: "Salk Medical — Equipamento Medico Nacional"
      buttons:
        - type: "quick_reply"
          text: "Ver caso completo"
        - type: "url"
          text: "Catalogo OSTUS"
          url: "https://salkmedical.com.br/ostus?utm_source=whatsapp&utm_medium=social&utm_campaign={{3}}"
      status: "draft"
      version: 1

    - id: "MKT-008"
      name: "nurturing_integracao_kronus"
      category: "marketing"
      language: "pt_BR"
      header:
        type: "image"
        content: "kronus-centro-cirurgico.jpg"
      body: |
        {{1}}, seu pendente cirurgico integra gases, eletrica e dados em um unico ponto?

        O KRONUS centraliza toda a infraestrutura do centro cirurgico:
        - Gases medicinais (O2, N2O, ar comprimido, vacuo)
        - Tomadas eletricas e de rede
        - Bracos articulados para monitores

        Configuracao customizada para {{2}} salas.
      footer: "Salk Medical — Equipamento Medico Nacional"
      buttons:
        - type: "quick_reply"
          text: "Solicitar projeto"
        - type: "quick_reply"
          text: "Falar com engenheiro"
      status: "draft"
      version: 1

    - id: "AUTH-001"
      name: "opt_in_confirmacao"
      category: "authentication"
      language: "pt_BR"
      header:
        type: "text"
        content: "Confirmacao de Cadastro"
      body: "Ola {{1}}, voce solicitou receber conteudo tecnico da Salk Medical via WhatsApp. Para confirmar, responda SIM. Voce pode cancelar a qualquer momento respondendo SAIR. Seus dados sao protegidos conforme LGPD."
      footer: "Salk Medical"
      buttons:
        - type: "quick_reply"
          text: "SIM, quero receber"
        - type: "quick_reply"
          text: "Nao, obrigado"
      status: "draft"
      version: 1

