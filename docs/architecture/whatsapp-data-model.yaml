# ===================================================================

database_notes:
  engine: "PostgreSQL (ja em uso no Content Studio)"
  queue: "Redis + Bull (ja disponivel na infra)"

  indices:
    - table: "contacts"
      columns: ["phone"]
      type: "unique"
      note: "E.164 format, unico por conta"
    - table: "contacts"
      columns: ["persona", "journey_phase"]
      type: "btree"
      note: "Busca rapida por segmentacao"
    - table: "contacts"
      columns: ["crm_id"]
      type: "btree"
      note: "Lookup por ID do Bitrix24"
    - table: "messages"
      columns: ["contact_id", "sent_at"]
      type: "btree"
      note: "Historico de mensagens por contato"
    - table: "messages"
      columns: ["meta_message_id"]
      type: "unique"
      note: "Lookup por WAMID para webhook updates"
    - table: "messages"
      columns: ["sequence_id", "status"]
      type: "btree"
      note: "Metricas por sequencia"
    - table: "messages"
      columns: ["status", "scheduled_at"]
      type: "btree"
      note: "Fila de envio — mensagens agendadas"
    - table: "sequence_enrollments"
      columns: ["contact_id", "sequence_id"]
      type: "unique"
      note: "Um contato nao pode estar na mesma sequencia 2 vezes"
    - table: "sequence_enrollments"
      columns: ["status", "next_message_at"]
      type: "btree"
      note: "Worker de envio — proximas mensagens"
    - table: "metrics"
      columns: ["entity_type", "entity_id", "period", "date"]
      type: "unique"
      note: "Uma metrica por entidade por periodo por data"

  constraints:
    - "contacts.opt_in MUST be true antes de envio de templates marketing"
    - "messages.cost_brl >= 0"
    - "metrics rates between 0.0 and 1.0"
    - "sequence_enrollments: max 1 enrollment ativa por contato por sequencia"
    - "templates: status approved obrigatorio para envio"
