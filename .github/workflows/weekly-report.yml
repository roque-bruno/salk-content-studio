name: Generate Weekly Report
on:
  schedule:
    - cron: '0 11 * * 1'  # Mondays at 11:00 UTC (08:00 BRT)
  workflow_dispatch:
    inputs:
      week_offset:
        description: 'Weeks back (0=current, 1=last week)'
        default: '1'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Generate weekly report
        env:
          STUDIO_API_URL: ${{ secrets.STUDIO_API_URL }}
          STUDIO_USER: ${{ secrets.STUDIO_USER }}
          STUDIO_PASS: ${{ secrets.STUDIO_PASS }}
        run: |
          TOKEN=$(curl -sf -X POST "${STUDIO_API_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${STUDIO_USER}\",\"password\":\"${STUDIO_PASS}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          RESULT=$(curl -sf "${STUDIO_API_URL}/api/publishers/report/generate" \
            -H "Authorization: Bearer ${TOKEN}")

          echo "Report generated: ${RESULT}" | head -200
