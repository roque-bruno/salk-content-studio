services:
  - type: web
    name: content-pipeline-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: packages/content-pipeline
    buildCommand: pip install -e .
    startCommand: uvicorn content_pipeline.web.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: BITRIX24_WEBHOOK_URL
        sync: false

  - type: web
    name: content-studio-frontend
    runtime: static
    branch: main
    rootDir: packages/content-studio-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
