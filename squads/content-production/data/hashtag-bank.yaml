# ═══════════════════════════════════════════════════════════════
# REGRAS DE USO
# ═══════════════════════════════════════════════════════════════

rules:
  instagram:
    total_max: 11
    strategy: "Core (3-5) + Produto (2-3) + Nicho (3-5) = 11"
    placement: "Após o CTA, com espaço"
  linkedin:
    total_max: 5
    strategy: "Apenas core + 1-2 técnicos relevantes"
    placement: "Final do post"
  youtube:
    total_max: 15
    strategy: "Tags no campo de tags do vídeo — core + produto + técnico"
    placement: "Campo de tags (não na descrição)"
    note: "YouTube é canal #3 IC — tags técnicas para SEO de vídeo"
  # facebook: DESCONTINUADO (Story 14.3 — Score IC: 0)
