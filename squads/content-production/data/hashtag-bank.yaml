# Banco de Hashtags Curadas — Manager Grupo
# Fonte: docs/ESTRATEGIA-PRODUCAO-CONTEUDO.md (linhas 1210-1249)
# Estratégia escada: core (sempre) + produto (rotar) + nicho (complementar)
# Instagram: 11 hashtags totais | LinkedIn: 3-5 totais

version: "1.0"
last_updated: "2026-03-16"

# ═══════════════════════════════════════════════════════════════
# SALK MEDICAL
# ═══════════════════════════════════════════════════════════════

salk_medical:
  core:
    always_use: true
    count: "3-5"
    tags:
      - "#SalkMedical"
      - "#EquipamentoMedico"
      - "#CentroCirurgico"
      - "#DispositivoMedico"
      - "#MedTech"

  produto:
    always_use: false
    rotate: true
    note: "Rotar conforme produto do post"
    tags:
      - "#LEV"
      - "#FocoCirurgico"
      - "#KRATUS"
      - "#MesaCirurgica"
      - "#OSTUS"
      - "#SerraCirurgica"
      - "#KRONUS"
      - "#COMMAND"
      - "#SalaCirurgicaInteligente"
      - "#IluminacaoCirurgica"

  nicho:
    always_use: false
    note: "Complementar até 11 totais no Instagram"
    tags:
      - "#EngenhariaClinica"
      - "#SaudePublica"
      - "#HospitalBrasileiro"
      - "#FabricacaoNacional"
      - "#LicitacaoSaude"
      - "#ComprasHospitalares"
      - "#CirurgiaBrasil"
      - "#IndustriaBrasileira"

  linkedin:
    max: 5
    tags:
      - "#EquipamentoMedico"
      - "#CentroCirurgico"
      - "#EngenhariaClinica"
      - "#DispositivoMedico"
      - "#FabricacaoNacional"

