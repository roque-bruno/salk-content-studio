# ═══════════════════════════════════════════════════════════════
# REGRAS DE USO
# ═══════════════════════════════════════════════════════════════

rules:
  instagram:
    total_max: 11
    strategy: "Core (3-5) + Produto (2-3) + Nicho (3-5) = 11"
    placement: "Após o CTA, com espaço"
  linkedin:
    total_max: 5
    strategy: "Apenas core + 1-2 técnicos relevantes"
    placement: "Final do post"
  youtube:
    note: "Tags no campo de tags do vídeo, não na descrição"
  facebook:
    total_max: 3
    strategy: "Apenas core"
