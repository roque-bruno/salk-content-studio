    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "3LEV=8h, 4LEV=6h, 1L=4:30h, 3LE=4h, 4LE=3h, M1LE/M1LEC=2h"

  # ── Campo e Ajustes ──
  - id: LEV-09
    claim: "Campo de luz ajustável de 150 a 360mm"
    accessible: "Foco preciso para cada tipo de procedimento"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
