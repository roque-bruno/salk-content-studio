# FOCOS CIRÚRGICOS — Linha LEV (Produto Atual)
# ═══════════════════════════════════════════════════════════════

focos_cirurgicos:
  # ── Reprodução de Cor ──
  - id: LEV-01
    claim: "Índice de Reprodução de Cor Ra 99 (linha LEV)"
    accessible: "A luz mais próxima da realidade"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "3LEV: Ra=99, R9=91. 4LEV: Ra=99, R9=97. Linha LE: Ra/R9=97"

  - id: LEV-02
    claim: "R9 até 97 na cúpula 4LEV — fidelidade na faixa do vermelho saturado"
    accessible: "Precisão onde mais importa: na distinção de tecidos"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "3LEV: R9=91. 4LEV: R9=97. R9 mede fidelidade do vermelho saturado — crítico para distinguir tecidos e vasos"

  # ── Iluminância ──
  - id: LEV-03
    claim: "Iluminância central máxima de até 160.000 lux"
    accessible: "Iluminação cirúrgica de alta intensidade"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "1L=60klx, 3LE=130klx, 3LEV=148klx, 4LE/4LEV/M1LE/M1LEC=160klx"

  # ── Temperatura de Cor ──
  - id: LEV-04
    claim: "Temperatura de cor ajustável de 3.000 a 6.500K em 9 níveis"
    accessible: "Luz personalizada para cada procedimento"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Disponível nos modelos 3LEV, 4LEV, 3LE, 4LE, M1LE, M1LEC. Modelo 1L tem temperatura fixa ~4597K"

  # ── Proteção e Segurança ──
  - id: LEV-05
    claim: "Proteção IP54 nas cúpulas LEV"
    accessible: "Vedado contra poeira e água"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "IP54 nos modelos 3LEV e 4LEV"

  - id: LEV-06
    claim: "Cúpulas LEV sem ventiladores — sem risco de contaminação por ventilação forçada"
    accessible: "Higiene máxima no ambiente cirúrgico"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Sem ventiladores nos modelos 3LEV e 4LEV — reduz risco de contaminação e é compatível com fluxo laminar"

  # ── Durabilidade ──
  - id: LEV-07
    claim: "LEDs com vida útil superior a 226.000 horas"
    accessible: "Mais de 25 anos de iluminação em uso típico"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: ">226.000 horas em todos os modelos da linha LEV e LE"

  # ── Emergência ──
