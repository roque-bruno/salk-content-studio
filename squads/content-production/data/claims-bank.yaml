# ═══════════════════════════════════════════════════════════════
# REGRAS DE PUBLICACAO (PRD v2.0)
# ═══════════════════════════════════════════════════════════════
publication_rules:
  publishable_products: ["LEV", "KRATUS", "OSTUS", "KRONUS"]
  blocked_products:
    - product: "ETRUS"
      reason: "NAO lancado — PROIBIDO publicar qualquer conteudo"
      unblock_condition: "Usuario confirma lancamento oficial"
  restricted_products:
    - product: "COMMAND"
      reason: "Integrado ao ETRUS — verificar se pode ser divulgado independentemente"
      restriction: "Usar SOMENTE claims CMD-01 e CMD-02. NAO associar ao ETRUS"

