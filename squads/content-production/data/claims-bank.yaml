    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Luz verde difusa para procedimentos endoscópicos"

  - id: LEV-11
    claim: "Dimmer de 20% a 100% para ajuste fino de intensidade"
    accessible: "Controle preciso da intensidade luminosa"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all

  # ── Certificação e Fabricação ──
  - id: LEV-12
    claim: "Fabricado no Brasil pela Mendel Medical com registro ANVISA 81205910005"
    accessible: "Tecnologia nacional certificada"
    status: APROVADO
    source: "Registro ANVISA 81205910005"
    allowed_formats: all

  - id: LEV-13
    claim: "Conforme NBR IEC 60601-2-41"
    accessible: "Conformidade com norma internacional de segurança"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Norma específica para focos cirúrgicos e luminárias de diagnóstico"

  # ── Integração COMMAND ──
  - id: LEV-14
    claim: "Compatível com Sistema COMMAND para controle integrado de sala cirúrgica"
    accessible: "Controle total sem sair do campo estéril"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "IHM touch screen, controle centralizado de sala cirúrgica"

  # ── Acessórios e Manutenção ──
  - id: LEV-15
    claim: "Manopla destacável e autoclavável em todos os modelos"
    accessible: "Esterilização fácil e segura"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all

  # ── Design ──
  - id: LEV-16
    claim: "Design aerodinâmico compatível com fluxo laminar"
    accessible: "Integração com sistema de ventilação da sala"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Derivado da ausência de ventiladores (LEV-06) + IP54 (LEV-05). Design sem protuberâncias que perturbem fluxo laminar"

  # ── Configurações ──
  - id: LEV-17
    claim: "Configurações Simplex, Duplex e Triplex para montagem em teto"
    accessible: "Configuração sob medida para cada sala cirúrgica"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Também disponível em versões Parede e Auxiliar"

  # ── Eficiência Energética ──
  - id: LEV-18
    claim: "Potência de apenas 64W na cúpula 4LEV para 160.000 lux"
    accessible: "Eficiência energética superior"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "3LEV=56,4W para 148klx, 4LEV=64W para 160klx"

  # ── Diluição de Sombra ──
  - id: LEV-19
    claim: "Diluição de sombra: até 40% com 2 máscaras (cúpula 4LEV)"
    accessible: "Visão sem obstáculos durante o procedimento"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "3LEV: 1 máscara 15%, 2 máscaras 34%. 4LEV: 1 máscara 14%, 2 máscaras 40%"

  # ── Câmera ──
  - id: LEV-20
    claim: "Câmera integrada opcional (modelo M1LEC)"
    accessible: "Registro visual do procedimento"
    status: APROVADO
    source: "Manual MM013-090070-R04 (Teto/Parede)"
    allowed_formats: all
    notes: "Modelo M1LEC possui câmera integrada de fábrica"

