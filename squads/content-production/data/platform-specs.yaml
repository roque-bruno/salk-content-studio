# ═══════════════════════════════════════════════════════════════
# VÍDEOS
# ═══════════════════════════════════════════════════════════════

videos:
  instagram_reels:
    format: "MP4"
    dimensions: "1080x1920"
    aspect_ratio: "9:16"
    duration_ideal: "7-30s (viral) / 30-60s (educativo)"
    duration_max: "3 min"
    safe_zone_central: "1080x1440"
    thumbnail_grid: "1080x1080 (1:1)"
  instagram_stories:
    format: "MP4"
    dimensions: "1080x1920"
    aspect_ratio: "9:16"
    duration_ideal: "15s por story"
    duration_max: "60s"
  linkedin_video:
    format: "MP4"
    dimensions: "1920x1080"
    aspect_ratio: "16:9 ou 1:1"
    duration_ideal: "< 90s"
    duration_max: "10 min"
  youtube_shorts:
    format: "MP4"
    dimensions: "1080x1920"
    aspect_ratio: "9:16"
    duration_ideal: "20-45s (geral) / 60-90s (B2B)"
    duration_max: "3 min"
    frame_rate: "30-60 FPS"
  youtube_long:
    format: "MP4"
    dimensions: "1920x1080"
    aspect_ratio: "16:9"
    duration_ideal: "10-20 min (demo) / 30-60 min (webinar)"
    duration_max: "12h"
  facebook_video:
    format: "MP4"
    dimensions: "1080x1080"
    aspect_ratio: "1:1 ou 16:9"
    duration_ideal: "< 60s"
    duration_max: "240 min"

# ═══════════════════════════════════════════════════════════════
# REGRAS GERAIS
# ═══════════════════════════════════════════════════════════════

rules:
  - "Legendas em vídeo são OBRIGATÓRIAS (muitos assistem sem som)"
  - "Safe zones respeitadas em Reels e Stories"
  - "Texto legível em mobile: mínimo 24pt"

# ═══════════════════════════════════════════════════════════════
# COPY — LIMITES POR PLATAFORMA
# ═══════════════════════════════════════════════════════════════

copy_limits:
  instagram_feed:
    char_limit: "300-500"
    technical_level: "5/10"
    tone: "Acessível, visual"
    hashtags: 11
  instagram_reels:
    char_limit: "15-60s script"
    technical_level: "3/10"
    tone: "Dinâmico, direto"
    hook: "3 primeiros segundos"
  instagram_stories:
    char_limit: "1-2 frases"
    technical_level: "3/10"
    tone: "Casual-profissional"
  linkedin:
    char_limit: "1500-3000"
    technical_level: "8/10"
    tone: "Profissional, consultivo, técnico"
    hashtags: "3-5"
  youtube_shorts:
    char_limit: "20-90s script"
    technical_level: "4/10"
    tone: "Educativo, rápido"
  youtube_long:
    char_limit: "5-60 min script"
    technical_level: "7/10"
    tone: "Tutorial, demonstrativo"
  facebook:
    char_limit: "80-100"
    technical_level: "4/10"
    tone: "Conversacional"

# ═══════════════════════════════════════════════════════════════
# FORMATOS PRIORITÁRIOS POR PLATAFORMA
# ═══════════════════════════════════════════════════════════════

priority_formats:
  instagram:
    first: "Reels (60-70% do conteúdo)"
    second: "Carousels 4:5 (20-30%)"
    third: "Stories (5-10%)"
  linkedin:
    first: "PDF Carousels (maior engagement: 6.60%)"
    second: "Texto longo + imagem"
    third: "Vídeo nativo < 90s"
  youtube:
    first: "Shorts 9:16 (descoberta)"
    second: "Vídeos longos 16:9 (conversão)"
  facebook:
    first: "Vídeo curto"
    second: "Posts com imagem"
    third: "Grupos (participação)"

# ═══════════════════════════════════════════════════════════════
# FREQUÊNCIA POR MARCA E PLATAFORMA
# ═══════════════════════════════════════════════════════════════

