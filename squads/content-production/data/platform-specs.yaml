    format: "JPG/PNG"
    dimensions: "1080x1350"
    aspect_ratio: "4:5"
    max_file_size: "30 MB"
  instagram_feed_quadrado:
    format: "JPG/PNG"
    dimensions: "1080x1080"
    aspect_ratio: "1:1"
    max_file_size: "30 MB"
  instagram_carousel:
    format: "JPG/PNG"
    dimensions: "1080x1350"
    aspect_ratio: "4:5"
    max_file_size: "30 MB"
    max_slides: 20
    ideal_slides_b2b: "7-10"
  instagram_stories:
    format: "JPG/PNG"
    dimensions: "1080x1920"
    aspect_ratio: "9:16"
    max_file_size: "30 MB"
  instagram_reel_cover:
    format: "JPG/PNG"
    dimensions: "1080x1920"
    aspect_ratio: "9:16"
  linkedin_post_paisagem:
    format: "JPG/PNG"
    dimensions: "1200x627"
    aspect_ratio: "1.91:1"
    max_file_size: "5 MB"
  linkedin_post_quadrado:
    format: "JPG/PNG"
    dimensions: "1200x1200"
