# ═══════════════════════════════════════════════════════════════
# REGRA DE LOGO POR TIPO DE CONTEUDO (PRD v2.0 FR-014)
# Definida pela diretora — 2026-03-17
# ═══════════════════════════════════════════════════════════════
logo_assignment:
  mendel_medical:
    use_when: "Conteudo tecnico, specs, fabricacao, engenharia, Ra/R9, normas, bastidores de fabrica"
    pillars: ["Bastidores da Fabrica", "Engenharia e Inovacao", "Dados Tecnicos Oficiais", "Educacional Tecnico"]
    rule: "Se tem numero tecnico (Ra, kg, mm, horas, lux) → Mendel"
  salk_medical:
    use_when: "Conteudo comercial, vendas, preco, atendimento, cases, licitacoes"
    pillars: ["Produto em Destaque", "Cases e Social Proof", "Licitacoes e TCO", "Sala Cirurgica Inteligente"]
    rule: "Se tem CTA de venda → Salk"
  source: "Feedback diretora 2026-03-17"

# ═══════════════════════════════════════════════════════════════
# SALK MEDICAL (Prioridade 1 — Comercial/Vendas)
# ═══════════════════════════════════════════════════════════════

salk_medical:
  priority: 1
  focus: "Comercial / Vendas"
  tagline: "Sala Cirúrgica Inteligente"
  website: "salkmedical.com.br"

  social:
    linkedin: "salkmedical"
    instagram: "@salkmedical"
    facebook: "salkmedical"
    youtube: "@salkmedical"

  tone:
    primary: "Consultivo, confiante, orientado a resultados"
    adjectives: ["Eficiente", "Confiável", "Acessível", "Inovador"]
    avoid: ["Agressivo", "Vendedor", "Arrogante"]

  content_pillars:
    - name: "Produto em Destaque"
      percentage: 30
      description: "Specs, demos, diferenciais de LEV, KRATUS, OSTUS, KRONUS, COMMAND"
    - name: "Educacional Técnico"
      percentage: 25
      description: "FAQ, tendências em CC, guias de compra"
    - name: "Cases e Social Proof"
      percentage: 20
      description: "Instalações, depoimentos, números, logos de clientes"
    - name: "Sala Cirúrgica Inteligente"
      percentage: 15
      description: "Conceito COMMAND, integração, futuro do CC"
    - name: "Licitações e TCO"
      percentage: 10
      description: "Processo de compra, compliance, custo-benefício"

  visual:
    # TODO: Confirmar HEX exatos com brand kit Canva
    primary_color: "#003366"  # Placeholder — confirmar
    secondary_color: "#0066CC"  # Placeholder — confirmar
    accent_color: "#FFFFFF"
    typography:
      primary: "A confirmar (Brand Kit Canva)"
      secondary: "A confirmar"
    logo_position: "Canto superior direito ou inferior esquerdo"
    badge: "Registro ANVISA"

