# ═══════════════════════════════════════════════════════════════
# REGRAS VISUAIS GLOBAIS
# ═══════════════════════════════════════════════════════════════

global_rules:
  product_images: "SEMPRE foto real (PNG uploadado como referencia). IA renderiza produto INTEGRADO na cena."
  ai_people: "NUNCA pessoas geradas por IA"
  ai_clinical: "NUNCA cenas clinicas com IA"
  product_appearance: "Cores e aparencia do produto DEVEM corresponder ao real"
  certifications: "Exibir apenas certificacoes validas e atuais"
  emoji_health: "NAO banalizar saude com emojis (caveiras, seringas, rostos doentes)"
  nb2_wallpaper: "NUNCA gerar wallpaper + colar PNG (PROIBIDO). NB2 = produto integrado na cena."
  nb2_competitor: "NUNCA equipamento medico concorrente na cena. Negative prompt obrigatorio."
  lev_light: "LEV: luz FOCADA para baixo, NUNCA dispersa/lateral. Sem glow, rays, spreading."
  text_logo_ia: "NUNCA gerar texto ou logo via IA. Adicionar no Canva."

  # Composicao Canva validada (2026-03-18)
  canva_composition:
    margins: "60px (5.5% da largura)"
    logo_min_width: "180-200px"
    headline: "36pt bold, alinhado a esquerda, topo"
    spec_line: "18-20pt light, branco 70% opacidade, tracking +80-100, centralizado rodape"
    anvisa_badge: "12-14pt, branco 50% opacidade, canto inferior direito"
    gradients: "Preto→transparente: topo 40-60%, rodape 50-70%"
    protected_zone: "NUNCA texto sobre produto ou reflexo"
